services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in the environment file}
      MYSQL_DATABASE: ${DB_NAME:?Set DB_NAME in the environment file}
      MYSQL_USER: ${DB_USER:?Set DB_USER in the environment file}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the environment file}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deployment/mysql/init/01-finsight.sql:/docker-entrypoint-initdb.d/01-finsight.sql:ro
    networks:
      - finsight-net
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u root -p"$${MYSQL_ROOT_PASSWORD}"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set a non-empty REDIS_PASSWORD in the environment file}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set a non-empty REDIS_PASSWORD in the environment file}
    volumes:
      - redis-data:/data
    networks:
      - finsight-net
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:4.3.0
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - finsight-net

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./deployment/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - finsight-net

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deployment/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - market-frontend
      - market-rest-1
      - market-rest-2
      - market-ingestion
    networks:
      - finsight-net

  market-rest-1:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  market-rest-2:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  market-ingestion:
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  market-realtime:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  market-collector:
    profiles:
      - live-market
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      mosquitto:
        condition: service_started

  market-webhooks:
    profiles:
      - payments
    ports:
      - "5000:5000"
    depends_on:
      kafka:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  mosquitto-data:
